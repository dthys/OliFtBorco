name: Fetch Bol.com Orders

on:
  schedule:
    # Runs every hour (adjust as needed)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch orders from bol.com API
        env:
          BOL_CLIENT_ID: ${{ secrets.BOL_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.BOL_CLIENT_SECRET }}
        run: python fetch_orders.py

      - name: Commit and push updated orders.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add orders.json
          git diff --cached --quiet || git commit -m "chore: update orders.json [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push
